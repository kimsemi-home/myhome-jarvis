# Generated from lisp/ssot/verification-graph.lisp.
name: quality

on:
  push:
    branches: ["**"]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"
  FLUTTER_VERSION: "3.44.2"
  RUST_TOOLCHAIN: "1.96.0"
  LISP: "sbcl-bin"
  UNIT_CACHE_VERSION: "v1"

jobs:
  public-safety:
    name: Public safety
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.mod
      - name: Run Public safety verification
        run: |
          go run ./cmd/mhj security check
          go run ./cmd/mhj security history

  ssot:
    name: SSOT and generated artifacts
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Restore SSOT and generated artifacts unit cache
        id: unit-cache
        uses: actions/cache/restore@v5
        with:
          path: .github/unit-cache/ssot
          key: ssot-${{ runner.os }}-${{ env.UNIT_CACHE_VERSION }}-${{ hashFiles('.github/workflows/quality.yml', 'lisp/ssot/**', 'lisp/scripts/**', 'generated/**') }}
      - name: Report SSOT and generated artifacts cache hit
        if: steps.unit-cache.outputs.cache-hit == 'true'
        run: echo "SSOT and generated artifacts unchanged for this unit hash."
      - name: Set up Common Lisp
        if: steps.unit-cache.outputs.cache-hit != 'true'
        uses: 40ants/setup-lisp@v4
      - name: Run SSOT and generated artifacts verification
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          ros -Q run -- --script lisp/scripts/validate-ssot.lisp
          ros -Q run -- --script lisp/scripts/codegen.lisp
          test -s generated/verification_graph.generated.json
          test -s generated/github_quality_workflow.generated.yml
          git diff --exit-code -- generated .github/workflows/quality.yml docs/verification-graph.md
      - name: Prepare SSOT and generated artifacts unit cache marker
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .github/unit-cache/ssot
          printf '%s\n' '${{ steps.unit-cache.outputs.cache-primary-key }}' > .github/unit-cache/ssot/key
      - name: Save SSOT and generated artifacts unit cache
        if: steps.unit-cache.outputs.cache-hit != 'true' && github.event_name == 'push' && github.repository == 'kimsemi-home/myhome-jarvis'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: .github/unit-cache/ssot
          key: ${{ steps.unit-cache.outputs.cache-primary-key }}

  go:
    name: Go daemon and CLI
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Restore Go daemon and CLI unit cache
        id: unit-cache
        uses: actions/cache/restore@v5
        with:
          path: .github/unit-cache/go
          key: go-${{ runner.os }}-${{ env.UNIT_CACHE_VERSION }}-${{ hashFiles('.github/workflows/quality.yml', '.go-version', 'rust-toolchain.toml', 'go.mod', 'go.sum', 'cmd/**/*.go', 'internal/**/*.go', 'generated/*.json', 'generated/github_quality_workflow.generated.yml') }}
      - name: Report Go daemon and CLI cache hit
        if: steps.unit-cache.outputs.cache-hit == 'true'
        run: echo "Go daemon and CLI unchanged for this unit hash."
      - name: Set up Go
        if: steps.unit-cache.outputs.cache-hit != 'true'
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true
          cache-dependency-path: go.mod
      - name: Run Go daemon and CLI verification
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          go run ./cmd/mhj ci verify
          go run ./cmd/mhj toolchain verify
          go run ./cmd/mhj code-shape status
          go run ./cmd/mhj harness home
          go run ./cmd/mhj harness finance
          go run ./cmd/mhj harness commerce
          go test ./...
          go vet ./...
          unformatted="$(gofmt -l cmd internal)"
          if [ -n "$unformatted" ]; then
            echo "$unformatted"
            exit 1
          fi
      - name: Prepare Go daemon and CLI unit cache marker
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .github/unit-cache/go
          printf '%s\n' '${{ steps.unit-cache.outputs.cache-primary-key }}' > .github/unit-cache/go/key
      - name: Save Go daemon and CLI unit cache
        if: steps.unit-cache.outputs.cache-hit != 'true' && github.event_name == 'push' && github.repository == 'kimsemi-home/myhome-jarvis'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: .github/unit-cache/go
          key: ${{ steps.unit-cache.outputs.cache-primary-key }}

  rust:
    name: Rust core and harness
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Restore Rust core and harness unit cache
        id: unit-cache
        uses: actions/cache/restore@v5
        with:
          path: .github/unit-cache/rust
          key: rust-${{ runner.os }}-${{ env.UNIT_CACHE_VERSION }}-${{ hashFiles('.github/workflows/quality.yml', 'rust-toolchain.toml', 'Cargo.toml', 'Cargo.lock', 'crates/**', 'fixtures/**') }}
      - name: Report Rust core and harness cache hit
        if: steps.unit-cache.outputs.cache-hit == 'true'
        run: echo "Rust core and harness unchanged for this unit hash."
      - name: Set up Rust
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          rustup toolchain install "${RUST_TOOLCHAIN}" --profile minimal --component rustfmt --component clippy
          rustup default "${RUST_TOOLCHAIN}"
      - name: Run Rust core and harness verification
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          cargo test --workspace
          cargo test -p mhj-core benchmark_smoke -- --nocapture
          cargo fmt --check
          cargo clippy --workspace -- -D warnings
      - name: Prepare Rust core and harness unit cache marker
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .github/unit-cache/rust
          printf '%s\n' '${{ steps.unit-cache.outputs.cache-primary-key }}' > .github/unit-cache/rust/key
      - name: Save Rust core and harness unit cache
        if: steps.unit-cache.outputs.cache-hit != 'true' && github.event_name == 'push' && github.repository == 'kimsemi-home/myhome-jarvis'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: .github/unit-cache/rust
          key: ${{ steps.unit-cache.outputs.cache-primary-key }}

  flutter:
    name: Flutter local client
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
      - name: Restore Flutter local client unit cache
        id: unit-cache
        uses: actions/cache/restore@v5
        with:
          path: .github/unit-cache/flutter
          key: flutter-${{ runner.os }}-${{ env.UNIT_CACHE_VERSION }}-${{ hashFiles('.github/workflows/quality.yml', 'apps/flutter/**', 'generated/commands.generated.json', 'generated/connectors.generated.json', 'generated/agent_cluster.generated.json', 'generated/learning.generated.json', 'generated/evidence.generated.json', 'generated/confidence.generated.json', 'generated/translation.generated.json', 'generated/control_plane.generated.json', 'generated/incidents.generated.json', 'generated/evidence_quality.generated.json', 'generated/review.generated.json', 'generated/code_shape.generated.json', 'generated/authority.generated.json') }}
      - name: Report Flutter local client cache hit
        if: steps.unit-cache.outputs.cache-hit == 'true'
        run: echo "Flutter local client unchanged for this unit hash."
      - name: Set up Flutter
        if: steps.unit-cache.outputs.cache-hit != 'true'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - name: Run Flutter local client verification
        if: steps.unit-cache.outputs.cache-hit != 'true'
        working-directory: apps/flutter
        run: |
          flutter test
          flutter analyze
      - name: Prepare Flutter local client unit cache marker
        if: steps.unit-cache.outputs.cache-hit != 'true'
        run: |
          mkdir -p .github/unit-cache/flutter
          printf '%s\n' '${{ steps.unit-cache.outputs.cache-primary-key }}' > .github/unit-cache/flutter/key
      - name: Save Flutter local client unit cache
        if: steps.unit-cache.outputs.cache-hit != 'true' && github.event_name == 'push' && github.repository == 'kimsemi-home/myhome-jarvis'
        uses: actions/cache/save@v5
        continue-on-error: true
        with:
          path: .github/unit-cache/flutter
          key: ${{ steps.unit-cache.outputs.cache-primary-key }}

  quality:
    name: Quality summary
    runs-on: ubuntu-latest
    needs: [public-safety, ssot, go, rust, flutter]
    if: always()
    timeout-minutes: 5

    steps:
      - name: Check unit results
        run: |
          echo "public-safety=${{ needs.public-safety.result }}"
          echo "ssot=${{ needs.ssot.result }}"
          echo "go=${{ needs.go.result }}"
          echo "rust=${{ needs.rust.result }}"
          echo "flutter=${{ needs.flutter.result }}"
          test "${{ needs.public-safety.result }}" = "success"
          test "${{ needs.ssot.result }}" = "success"
          test "${{ needs.go.result }}" = "success"
          test "${{ needs.rust.result }}" = "success"
          test "${{ needs.flutter.result }}" = "success"
